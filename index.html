<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordPress 임시글 발행기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;padding:1.5rem}
.app{max-width:560px;margin:0 auto}
h1{font-size:20px;font-weight:600;color:#111;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:1.5rem}
.section{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.section-title{font-size:12px;font-weight:600;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;display:flex;justify-content:space-between;align-items:center}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#E6F1FB;color:#185FA5}
.badge.success{background:#EAF3DE;color:#27500A}
.badge.loading{background:#fff8e1;color:#92400e}
.badge.error{background:#FCEBEB;color:#791F1F}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field label{font-size:12px;color:#555;display:block;margin-bottom:4px}
.field input{width:100%;height:38px;padding:0 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#111;outline:none;background:#fafafa}
.field input:focus{border-color:#185FA5;background:#fff}
.token-row{display:flex;gap:8px;align-items:flex-end}
.token-row .field{flex:1}
.token-save-btn{height:38px;padding:0 14px;border:1px solid #185FA5;border-radius:8px;background:#185FA5;color:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.token-save-btn:hover{background:#0C447C}
.token-status{font-size:11px;margin-top:4px}
.token-status.saved{color:#27500A}
.token-status.empty{color:#aaa}
.tab-row{display:flex;gap:6px;margin-bottom:12px}
.tab{padding:5px 12px;border:1px solid #ddd;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:#fafafa;color:#666}
.tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.keyword-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px;max-height:280px;overflow-y:auto}
.kw-btn{padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fafafa;font-size:13px;color:#111;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;transition:border-color 0.15s}
.kw-btn:hover{border-color:#aaa;background:#f0f0f0}
.kw-btn.selected{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.kw-btn .del{font-size:14px;color:#aaa;padding:0 2px;opacity:0}
.kw-btn:hover .del{opacity:1}
.divider{height:1px;background:#f0f0f0;margin:12px 0}
.add-row{display:flex;gap:8px}
.add-row input{flex:1;height:38px;padding:0 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;color:#111;outline:none}
.add-row input:focus{border-color:#185FA5}
.add-row button{height:38px;padding:0 16px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;color:#111;cursor:pointer}
.add-row button:hover{background:#f5f5f5}
.selected-box{background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:12px;min-height:64px}
.selected-box .label{font-size:12px;color:#888;margin-bottom:4px}
.selected-box .value{font-size:15px;font-weight:600;color:#111}
.selected-box .preview{font-size:12px;color:#666;margin-top:4px}
.publish-btn{width:100%;height:46px;border:none;border-radius:10px;background:#185FA5;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.publish-btn:hover{background:#0C447C}
.publish-btn:disabled{opacity:0.4;cursor:not-allowed}
.toast{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none;font-weight:500}
.toast.success{background:#EAF3DE;color:#27500A;border:1px solid #97C459;display:block}
.toast.error{background:#FCEBEB;color:#791F1F;border:1px solid #F09595;display:block}
.refresh-btn{font-size:11px;padding:2px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#555}
.refresh-btn:hover{background:#f5f5f5}
.empty{font-size:13px;color:#aaa;text-align:center;padding:20px 0}
</style>
</head>
<body>
<div class="app">
  <h1>WordPress 임시글 발행기</h1>
  <p class="sub">키워드를 선택하고 GitHub Actions로 발행합니다</p>

  <div id="toast" class="toast"></div>

  <div class="section">
    <div class="section-title">설정</div>
    <div class="grid2">
      <div class="field"><label>GitHub 사용자명</label><input id="cfg-user" type="text" value="pikavv-stack"></div>
      <div class="field"><label>레포 이름</label><input id="cfg-repo" type="text" value="wp210904col317"></div>
    </div>
    <div class="field" style="margin-bottom:8px"><label>워크플로우 파일명</label><input id="cfg-workflow" type="text" value="draft_post.yml"></div>
    <div class="token-row">
      <div class="field">
        <label>GitHub Token</label>
        <input id="cfg-token" type="password" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <button class="token-save-btn" onclick="saveToken()">저장</button>
    </div>
    <div id="token-status" class="token-status empty">토큰이 저장되지 않았습니다</div>
  </div>

  <div class="section">
    <div class="section-title">
      <span>키워드 목록 <span id="kw-badge" class="badge loading">로딩 중...</span></span>
      <button class="refresh-btn" onclick="loadRemoteKeywords()">새로고침</button>
    </div>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('remote', this)">오늘 수집</button>
      <button class="tab" onclick="switchTab('manual', this)">직접 관리</button>
    </div>
    <div id="tab-remote">
      <div class="keyword-grid" id="remote-grid"><div class="empty">키워드 불러오는 중...</div></div>
    </div>
    <div id="tab-manual" style="display:none">
      <div class="keyword-grid" id="manual-grid"></div>
      <div class="divider"></div>
      <div class="add-row">
        <input id="new-kw" type="text" placeholder="새 키워드 입력">
        <button onclick="addKeyword()">추가</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">발행 준비</div>
    <div class="selected-box">
      <div class="label">선택된 키워드</div>
      <div class="value" id="selected-value" style="color:#aaa">키워드를 선택하세요</div>
      <div class="preview" id="title-preview"></div>
    </div>
    <button class="publish-btn" id="publish-btn" onclick="publish()" disabled>임시글 발행하기</button>
  </div>
</div>

<script>
var REPO_USER = 'pikavv-stack';
var REPO_NAME = 'APPwp210904col317';
var selected = null;
var currentTab = 'remote';
var remoteKeywords = [];
var manualKeywords = JSON.parse(localStorage.getItem('wp_manual_keywords') || '[]');

function loadSavedToken(){
  var saved = localStorage.getItem('wp_gh_token');
  if(saved){
    document.getElementById('cfg-token').value = saved;
    document.getElementById('token-status').textContent = '토큰이 저장되어 있습니다';
    document.getElementById('token-status').className = 'token-status saved';
  }
}

function saveToken(){
  var token = document.getElementById('cfg-token').value.trim();
  if(!token){ showToast('토큰을 입력해주세요', 'error'); return; }
  localStorage.setItem('wp_gh_token', token);
  document.getElementById('token-status').textContent = '토큰이 저장되었습니다';
  document.getElementById('token-status').className = 'token-status saved';
  showToast('토큰이 저장되었습니다', 'success');
}

function saveManual(){ localStorage.setItem('wp_manual_keywords', JSON.stringify(manualKeywords)); }

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('tab-remote').style.display = tab === 'remote' ? '' : 'none';
  document.getElementById('tab-manual').style.display = tab === 'manual' ? '' : 'none';
  renderKeywords();
}

function loadRemoteKeywords(){
  var badge = document.getElementById('kw-badge');
  badge.className = 'badge loading';
  badge.textContent = '로딩 중...';
  var url = 'https://raw.githubusercontent.com/' + REPO_USER + '/' + REPO_NAME + '/main/keywords.json?t=' + Date.now();
  fetch(url)
    .then(function(res){
      if(!res.ok) throw new Error('파일 없음');
      return res.json();
    })
    .then(function(data){
      remoteKeywords = Array.isArray(data) ? data : [];
      badge.className = 'badge success';
      badge.textContent = '오늘 수집 ' + remoteKeywords.length + '개';
      renderKeywords();
    })
    .catch(function(){
      badge.className = 'badge error';
      badge.textContent = '불러오기 실패';
      document.getElementById('remote-grid').innerHTML = '<div class="empty">키워드를 불러올 수 없습니다.<br>Actions에서 collect를 먼저 실행해 주세요.</div>';
    });
}

function renderKeywords(){
  if(currentTab === 'remote'){
    var grid = document.getElementById('remote-grid');
    if(remoteKeywords.length === 0){
      grid.innerHTML = '<div class="empty">수집된 키워드가 없습니다.<br>Actions에서 collect를 먼저 실행해 주세요.</div>';
      return;
    }
    grid.innerHTML = '';
    remoteKeywords.forEach(function(kw){
      grid.appendChild(makeKwBtn(kw, null, false));
    });
  } else {
    var grid2 = document.getElementById('manual-grid');
    if(manualKeywords.length === 0){
      grid2.innerHTML = '<div class="empty">직접 추가한 키워드가 없습니다.</div>';
      return;
    }
    grid2.innerHTML = '';
    manualKeywords.forEach(function(kw, i){
      grid2.appendChild(makeKwBtn(kw, i, true));
    });
  }
}

function makeKwBtn(kw, index, canDelete){
  var btn = document.createElement('button');
  btn.className = 'kw-btn' + (selected === kw ? ' selected' : '');
  var delHtml = canDelete ? '<span class="del" onclick="event.stopPropagation();delKw('+index+')">&#x2715;</span>' : '';
  btn.innerHTML = '<span>' + kw + '</span>' + delHtml;
  btn.onclick = function(){ selectKw(kw); };
  return btn;
}

function selectKw(kw){
  selected = kw;
  var titles = [kw + ' 완벽 가이드 2026', kw + ' 신청 방법과 조건 총정리', '2026년 ' + kw + ' 최신 정보'];
  var title = titles[Math.floor(Math.random() * titles.length)];
  document.getElementById('selected-value').textContent = kw;
  document.getElementById('selected-value').style.color = '#111';
  document.getElementById('title-preview').textContent = '예상 제목: "' + title + '"';
  document.getElementById('publish-btn').disabled = false;
  renderKeywords();
}

function delKw(i){
  if(selected === manualKeywords[i]){ selected = null; resetSelected(); }
  manualKeywords.splice(i, 1);
  saveManual();
  renderKeywords();
}

function resetSelected(){
  document.getElementById('selected-value').textContent = '키워드를 선택하세요';
  document.getElementById('selected-value').style.color = '#aaa';
  document.getElementById('title-preview').textContent = '';
  document.getElementById('publish-btn').disabled = true;
}

function addKeyword(){
  var inp = document.getElementById('new-kw');
  var val = inp.value.trim();
  if(!val || manualKeywords.indexOf(val) > -1) return;
  manualKeywords.push(val);
  saveManual();
  renderKeywords();
  inp.value = '';
}

function showToast(msg, type){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(function(){ t.className = 'toast'; }, 5000);
}

function publish(){
  var user = document.getElementById('cfg-user').value.trim();
  var repo = document.getElementById('cfg-repo').value.trim();
  var workflow = document.getElementById('cfg-workflow').value.trim();
  var token = document.getElementById('cfg-token').value.trim();
  if(!token){ showToast('GitHub Token을 입력해주세요', 'error'); return; }
  if(!selected){ showToast('키워드를 선택해주세요', 'error'); return; }
  var btn = document.getElementById('publish-btn');
  btn.disabled = true;
  btn.textContent = '발행 중...';
  fetch('https://api.github.com/repos/' + user + '/' + repo + '/actions/workflows/' + workflow + '/dispatches', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ ref: 'main', inputs: { keyword: selected, mode: 'publish' } })
  }).then(function(res){
    if(res.status === 204){
      showToast('"' + selected + '" 발행 요청 완료! WordPress에 임시글이 생성됩니다.', 'success');
      selected = null;
      resetSelected();
      renderKeywords();
    } else {
      res.json().then(function(err){
        showToast('오류 ' + res.status + ': ' + (err.message || '발행 실패'), 'error');
      }).catch(function(){ showToast('오류 ' + res.status, 'error'); });
    }
  }).catch(function(e){
    showToast('오류: ' + e.message, 'error');
  }).finally(function(){
    btn.textContent = '임시글 발행하기';
    btn.disabled = !selected;
  });
}

document.getElementById('new-kw').addEventListener('keydown', function(e){ if(e.key === 'Enter') addKeyword(); });

loadSavedToken();
loadRemoteKeywords();
renderKeywords();
</script>
</body>
</html>
